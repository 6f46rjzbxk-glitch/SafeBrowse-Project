<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>SafeBrowse</title>

  <style>
    body{
      width:360px;
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
    }

    .container{
      padding:18px;
    }

    h2{
      text-align:center;
      margin-top:0;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      padding:18px;
      margin-top:15px;
    }

    #score{
      font-size:42px;
      font-weight:bold;
      text-align:center;
      margin:10px 0;
    }

    #status{
      text-align:center;
      font-size:18px;
      font-weight:bold;
    }

    .bar{
      width:100%;
      height:10px;
      background:#334155;
      border-radius:20px;
      overflow:hidden;
      margin-top:15px;
    }

    #fill{
      height:100%;
      width:0%;
      background:#22c55e;
      transition:0.3s;
    }

    .info{
      margin-top:12px;
      background:#1e293b;
      padding:12px;
      border-radius:12px;
      font-size:13px;
      line-height:1.5;
    }

    #url{
      color:#93c5fd;
      word-break:break-all;
    }

    .small{
      text-align:center;
      font-size:12px;
      color:#cbd5e1;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🛡 SafeBrowse</h2>

  <div class="small">
    Сайт автоматты түрде тексерілуде...
  </div>

  <div class="card">

    <div style="text-align:center;">
      Қауіп деңгейі
    </div>

    <div id="score">0%</div>

    <div id="status">
      Тексерілуде...
    </div>

    <div class="bar">
      <div id="fill"></div>
    </div>

  </div>

  <div class="info">
    <b>URL:</b>
    <div id="url">-</div>
  </div>

  <div class="info">
    <b>Анықталған себептер:</b>
    <div id="reasons">
      Нәтиже күтілуде...
    </div>
  </div>

</div>

<script src="popup.js"></script>

</body>
</html>
